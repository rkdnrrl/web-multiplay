<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiplay Cube Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="overlay">
    <div id="login">
      <h2>Multiplay Cube</h2>
      <input id="nameInput" placeholder="이름을 입력하세요" maxlength="20" autocomplete="off">
      <input id="roomInput" placeholder="방 이름 (예: lobby)" maxlength="30" autocomplete="off">
      <div id="roomListWrap">
        <div id="roomListTitle">활성 방 (최대 4명)</div>
        <div id="roomList"></div>
      </div>
      <button id="joinBtn">입장</button>
    </div>
  </div>

  <div id="hud" class="hidden">
    <div>WASD: 이동</div>
    <div>마우스 이동: 시점/방향 회전 (클릭 시 마우스 고정)</div>
    <div>마우스 왼쪽 클릭: 크로스헤어 적 공격</div>
    <div id="playerCount"></div>
  </div>
  <div id="crosshair" class="hidden" aria-hidden="true">
    <div class="crosshair-v"></div>
    <div class="crosshair-h"></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
