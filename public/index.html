<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiplay Cube Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="overlay">
    <div id="login">
      <h2>Multiplay Cube</h2>
      <div id="alpBadge" class="hidden">ALP 계정으로 입장: <strong id="alpNickname"></strong></div>
      <input id="nameInput" placeholder="이름을 입력하세요" maxlength="20" autocomplete="off">
      <input id="roomInput" placeholder="방 이름 (예: lobby)" maxlength="30" autocomplete="off">
      <div id="roomListWrap">
        <div id="roomListTitle">활성 방 (최대 4명)</div>
        <div id="roomList"></div>
      </div>
      <label id="mobileUiPrefLabel" class="pref-row">
        <input type="checkbox" id="mobileUiPref">
        <span>모바일 조작 UI (터치 조작)</span>
      </label>
      <button id="joinBtn">입장</button>
    </div>
  </div>

  <div id="hud" class="hidden">
    <div id="hudHintsDesktop">
      <div>WASD: 이동</div>
      <div>마우스 이동: 시점/방향 회전 (클릭 시 마우스 고정)</div>
      <div>마우스 왼쪽 클릭: 크로스헤어 적 공격</div>
    </div>
    <div id="hudHintsMobile" class="hidden">
      <div>왼쪽: 이동 스틱</div>
      <div>오른쪽 화면 드래그: 시점</div>
      <div>발사 / 점프 버튼</div>
    </div>
    <div id="playerCount"></div>
  </div>
  <div id="crosshair" class="hidden" aria-hidden="true">
    <div class="crosshair-v"></div>
    <div class="crosshair-h"></div>
  </div>

  <button type="button" id="mobileUiToggleBtn" class="hidden" aria-pressed="false" title="모바일 조작 UI 켜기/끄기">
    조작 UI
  </button>

  <div id="mobileUiPanel" class="hidden" aria-hidden="true">
    <div id="mobileStickArea">
      <div id="mobileStickRing" aria-hidden="true">
        <div id="mobileStickKnob" aria-hidden="true"></div>
      </div>
      <span id="mobileStickHint">이동</span>
    </div>
    <div id="mobileLookArea" aria-hidden="true"></div>
    <div id="mobileActions">
      <button type="button" id="mobileJumpBtn">점프</button>
      <button type="button" id="mobileFireBtn">발사</button>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script src="/config.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
